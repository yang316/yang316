name: Generate Snake and Hitokoto

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: yang316
          outputs: dist/github-contribution-grid-snake-dark.svg

      - name: Fetch Hitokoto
        run: |
          HITOKOTO=$(curl -s 'https://v1.hitokoto.cn/?c=d&c=h&c=i&c=k&encode=json' | jq -r '"「\(.hitokoto)」—— \(.from)"')
          echo "HITOKOTO=$HITOKOTO" >> $GITHUB_ENV

      - name: Update README
        run: |
          sed -i "s|<!-- HITOKOTO -->.*<!-- /HITOKOTO -->|<!-- HITOKOTO -->$HITOKOTO<!-- /HITOKOTO -->|" README.md

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/ README.md
          git diff --staged --quiet || git commit -m "update snake & hitokoto"
          git push
